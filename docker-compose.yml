---
services:
  immich-ts:
    image: tailscale/tailscale:latest
    container_name: "${STACK_PREFIX:-gallery1}-tailscale"
    hostname: "${STACK_PREFIX:-gallery1}-ts"
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
      - TS_EXTRA_ARGS=${TS_EXTRA_ARGS:---advertise-tags=tag:container --reset}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=${TS_USERSPACE:-false}
    volumes:
      - ts_state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    ports:
      - "${PUBLIC_PORT:-2283}:2283"
    restart: unless-stopped
    networks:
      - app_net

  immich-server:
    container_name: "${STACK_PREFIX:-gallery1}-app"
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    depends_on:
      - redis
      - database
      - immich-machine-learning
      - immich-ts
    network_mode: "service:immich-ts"
    environment:
      - TZ=${TIMEZONE:-Etc/UTC}
      - DB_HOSTNAME=database
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE_NAME=${DB_DATABASE_NAME}
      - REDIS_HOSTNAME=redis
      - REDIS_PORT=6379
    volumes:
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped

  immich-machine-learning:
    container_name: "${STACK_PREFIX:-gallery1}-ml"
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    environment:
      - TZ=${TIMEZONE:-Etc/UTC}
      - DB_HOSTNAME=database
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE_NAME=${DB_DATABASE_NAME}
      - REDIS_HOSTNAME=redis
      - REDIS_PORT=6379
    volumes:
      - ${MODEL_CACHE_LOCATION}:/cache
    restart: unless-stopped
    networks:
      - app_net

  redis:
    container_name: "${STACK_PREFIX:-gallery1}-redis"
    image: docker.io/valkey/valkey:9
    restart: unless-stopped
    networks:
      - app_net

  database:
    container_name: "${STACK_PREFIX:-gallery1}-db"
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_DB=${DB_DATABASE_NAME}
      - POSTGRES_INITDB_ARGS=--data-checksums
      # Uncomment if the DB lives on HDD storage
      # - DB_STORAGE_TYPE=HDD
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: unless-stopped
    networks:
      - app_net

volumes:
  ts_state:
    name: "${STACK_PREFIX:-gallery1}_ts_state"

networks:
  app_net:
    name: "${STACK_PREFIX:-gallery1}_net"